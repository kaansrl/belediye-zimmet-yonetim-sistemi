{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-4">
    <div class="card card-soft p-4">
      <h3 class="mb-1">Giriş</h3>
      <div class="muted mb-3">BDZYS sistemine erişmek için giriş yapın.</div>

      {% if form.errors %}
        <div class="alert alert-danger py-2">
          Kullanıcı adı veya parola hatalı.
        </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Kullanıcı adı</label>
          <input type="text" name="username" class="form-control" autocomplete="username" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Parola</label>
          <input type="password" name="password" class="form-control" autocomplete="current-password" required>
        </div>

        <button class="btn w-100 login-btn" type="submit">Giriş Yap</button>
      </form>

      <div class="muted small mt-3">
        Not: Yetkisiz erişimler kayıt altına alınabilir.
      </div>
    </div>
  </div>
</div>

{% endblock %}
